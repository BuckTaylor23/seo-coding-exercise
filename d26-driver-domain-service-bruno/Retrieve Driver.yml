info:
  name: Retrieve Driver
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:9292/api/v1/drivers/{{driving_licence_number}}
  headers:
    - name: Content-Type
      value: application/json
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code 200 returned for successful retrieve driver request", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response contains the correct driving licence number", function() {
          const dln = bru.getEnvVar("driving_licence_number");
          expect(res.body.driving_licence_number).to.equal(dln);
        })

        test("Response contains all driver fields", function() {
            expect(res.body.id).to.be.an("number");
            expect(res.body.driving_licence_number).to.not.be.empty;
            expect(res.body.first_names).to.not.be.empty;
            expect(res.body.last_name).to.not.be.empty;
            expect(res.body.date_of_birth).to.not.be.empty;
            expect(res.body.driving_licence_type).to.not.be.empty;
        })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
